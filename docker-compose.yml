
services:
  postgres:
    image: postgres:17-alpine
    container_name: pingmate_postgres
    environment:
      POSTGRES_USER: sanum
      POSTGRES_PASSWORD: "12345"
      POSTGRES_DB: pingmate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanum"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pingmate_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: